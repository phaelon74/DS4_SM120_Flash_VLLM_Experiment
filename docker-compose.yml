services:
  vllm:
    build:
      context: .
      dockerfile: Dockerfile.vllm-nightly-sm120
    image: vllm-deepseekv4-sm120-deepgemm:latest
    container_name: vllm-deepseekv4-sm120-deepgemm
    entrypoint: /bin/bash
    command:
      - -lc
      - |
        set -euo pipefail
        cd /workspace/DeepGEMM
        DG_FORCE_BUILD=0 CUDA_HOME=/usr/local/cuda python3 -m pip install -e . --no-build-isolation
        python3 docker/patch_vllm_deepseekv4.py
        export VLLM_USE_DEEP_GEMM=1
        export VLLM_USE_DEEP_GEMM_E8M0=1
        export VLLM_ENGINE_READY_TIMEOUT_S=3600
        export VLLM_RPC_TIMEOUT=600000
        export TILELANG_CLEANUP_TEMP_FILES=1
        export TORCH_ALLOW_TF32_CUBLAS_OVERRIDE=1
        export DG_SM120_SKIP_PADDED_ZERO=1
        export DG_SM120_FP4_COLS_PER_BLOCK=8
        export DG_SM120_FULL_CONTEXT_BF16_BMM=1
        export DG_SM120_INDEXED_BF16_BMM=1
        export DG_SM120_WORKSPACE_FUSED_ATTENTION=1
        export DG_SM120_WORKSPACE_SPLIT_ATTENTION="${DG_SM120_WORKSPACE_SPLIT_ATTENTION:-1}"
        export DG_SM120_ENABLE_FP8_M1_KBLOCK="${DG_SM120_ENABLE_FP8_M1_KBLOCK:-1}"
        export DG_SM120_ENABLE_FP8_M1_WARPCOL_HEURISTIC="${DG_SM120_ENABLE_FP8_M1_WARPCOL_HEURISTIC:-1}"
        export DG_SM120_ENABLE_FP8_M1_FUSED="${DG_SM120_ENABLE_FP8_M1_FUSED:-1}"
        export DG_SM120_ENABLE_BHR_M1_MMA="${DG_SM120_ENABLE_BHR_M1_MMA:-1}"
        export DG_SM120_MOE_SKIP_SFA_FILL="${DG_SM120_MOE_SKIP_SFA_FILL:-1}"
        export DG_SM120_MOE_ROW_GROUPED="${DG_SM120_MOE_ROW_GROUPED:-1}"
        export DG_SM120_MOE_ROW_GROUPED_MAX_M="${DG_SM120_MOE_ROW_GROUPED_MAX_M:-6}"
        export DG_SM120_MOE_ROW_GROUPED_SKIP_SFA_FILL="${DG_SM120_MOE_ROW_GROUPED_SKIP_SFA_FILL:-1}"
        export DG_SM120_MOE_DIRECT_GROUPS_WHEN_NO_SHRINK="${DG_SM120_MOE_DIRECT_GROUPS_WHEN_NO_SHRINK:-1}"
        export DG_SM120_CACHE_FP8_SFB="${DG_SM120_CACHE_FP8_SFB:-1}"
        export DG_SM120_CACHE_FP8_SFA_FILL="${DG_SM120_CACHE_FP8_SFA_FILL:-1}"
        export DG_SM120_SPEC_ARGMAX_FASTPATH="${DG_SM120_SPEC_ARGMAX_FASTPATH:-1}"
        export DG_SM120_BHR_D_PER_BLOCK="${DG_SM120_BHR_D_PER_BLOCK:-1}"
        export DG_SM120_BHR_KBLOCK_SCALE="${DG_SM120_BHR_KBLOCK_SCALE:-1}"
        export DG_SM120_ENABLE_BHR_WARPCOL_HEURISTIC="${DG_SM120_ENABLE_BHR_WARPCOL_HEURISTIC:-1}"
        export DG_SM120_BHR_WARPCOL_WARPS="${DG_SM120_BHR_WARPCOL_WARPS:-4}"
        export DG_SM120_BHR_WARPCOL_COLS="${DG_SM120_BHR_WARPCOL_COLS:-0}"
        export DG_SM120_ENABLE_SMALL_M_MMA=0
        export DG_SM120_MHC_REUSE_BUFFERS="${DG_SM120_MHC_REUSE_BUFFERS:-1}"
        export DG_SM120_MAIN_TOPK_CAP="${DG_SM120_MAIN_TOPK_CAP:-128}"
        export DG_SM120_ACTIVE_HEADS=32
        export DG_SM120_SEQUENTIAL_COMPRESSOR="${DG_SM120_SEQUENTIAL_COMPRESSOR:-1}"
        export DG_SM120_FLASHMLA_PREFILL_WORKSPACE_FACTOR="${DG_SM120_FLASHMLA_PREFILL_WORKSPACE_FACTOR:-1}"
        export DG_SM120_PREFILL_WORKSPACE_CHUNK="${DG_SM120_PREFILL_WORKSPACE_CHUNK:-256}"
        export DG_SM120_PREFILL_TORCH_BMM="${DG_SM120_PREFILL_TORCH_BMM:-1}"
        export DG_SM120_PREFILL_TORCH_COMPILE="${DG_SM120_PREFILL_TORCH_COMPILE:-0}"
        export DG_SM120_PREFILL_TORCH_COMPILE_MIN_ROWS="${DG_SM120_PREFILL_TORCH_COMPILE_MIN_ROWS:-64}"
        export DG_SM120_PREFILL_CUDNN="${DG_SM120_PREFILL_CUDNN:-0}"
        export DG_SM120_PREFILL_CUDNN_UNMASKED="${DG_SM120_PREFILL_CUDNN_UNMASKED:-0}"
        export DG_SM120_PREFILL_TRUST_INDICES="${DG_SM120_PREFILL_TRUST_INDICES:-1}"
        export DG_SM120_PREFILL_TRIM_TOPK_MIN_WIDTH="${DG_SM120_PREFILL_TRIM_TOPK_MIN_WIDTH:-2048}"
        export DG_SM120_PREFILL_TRIM_TOPK="${DG_SM120_PREFILL_TRIM_TOPK:-1}"
        export DG_SM120_PREFILL_DYNAMIC_COMPRESSED_N="${DG_SM120_PREFILL_DYNAMIC_COMPRESSED_N:-1}"
        export DG_SM120_PREFILL_EMPTY_COMBINED_INDICES="${DG_SM120_PREFILL_EMPTY_COMBINED_INDICES:-1}"
        export DG_SM120_PREFILL_INDEXED_SPLIT="${DG_SM120_PREFILL_INDEXED_SPLIT:-0}"
        export DG_SM120_PREFILL_INDEX_SELECT="${DG_SM120_PREFILL_INDEX_SELECT:-0}"
        export DG_SM120_PREFILL_GATHER_WORKSPACE="${DG_SM120_PREFILL_GATHER_WORKSPACE:-0}"
        export DG_SM120_PREFILL_DIRECT_FP8_MAP="${DG_SM120_PREFILL_DIRECT_FP8_MAP:-0}"
        export DG_SM120_PREFILL_DIRECT_FP8_MAP_STRICT="${DG_SM120_PREFILL_DIRECT_FP8_MAP_STRICT:-0}"
        # SM120 fused decode v2: single-CTA, FP8 cache direct, online softmax.
        # Default-off until live validation; flip to "1" to enable for c1.
        export DG_SM120_FUSED_DECODE_V2="${DG_SM120_FUSED_DECODE_V2:-0}"
        export DG_SM120_FUSED_DECODE_V2_STRICT="${DG_SM120_FUSED_DECODE_V2_STRICT:-0}"
        # SM120 fused decode v2 NATIVE FP8 block-scaled MMA path (testing-blind).
        # Requires DG_SM120_FUSED_DECODE_V2=1 to take effect. When set to 1, the
        # v2 entry attempts the native multi-head-per-CTA tensor-core kernel
        # (mma.sync.aligned.m16n8k32.kind::mxf8f6f4.block_scale) and falls back
        # to the v2 scalar kernel if the runtime shape is unsupported.
        export DG_SM120_FUSED_DECODE_V2_NATIVE="${DG_SM120_FUSED_DECODE_V2_NATIVE:-0}"
        # 1 = use FP8 block-scale MMA inner; 0 = bf16-promotion fallback (TODO).
        export DG_SM120_FUSED_DECODE_V2_FP8MMA="${DG_SM120_FUSED_DECODE_V2_FP8MMA:-1}"
        # Split-K factor for the native path (1 disables, 4 is the kernel default).
        export DG_SM120_FUSED_DECODE_V2_SPLITK="${DG_SM120_FUSED_DECODE_V2_SPLITK:-4}"
        # SM120 fused prefill v2: single-kernel, FP8 cache direct, online softmax.
        # Default-off; only used when chunk has no SWA half.
        export DG_SM120_FUSED_PREFILL_V2="${DG_SM120_FUSED_PREFILL_V2:-0}"
        export DG_SM120_FUSED_PREFILL_V2_STRICT="${DG_SM120_FUSED_PREFILL_V2_STRICT:-0}"
        # SM120 HC prenorm v2: tiled unified-kernel replacement for the scalar
        # fallback. Default-on; safe to leave enabled across all N <= 64.
        export DG_SM120_HC_PRENORM_V2="${DG_SM120_HC_PRENORM_V2:-1}"
        export DG_SM120_ENABLE_B12X_MOE="${DG_SM120_ENABLE_B12X_MOE:-0}"
        export DG_SM120_B12X_A1_GS="${DG_SM120_B12X_A1_GS:-1.0}"
        export DG_SM120_B12X_A2_GS="${DG_SM120_B12X_A2_GS:-1.0}"
        export DG_SM120_BYPASS_TP_ALLREDUCE="${DG_SM120_BYPASS_TP_ALLREDUCE:-0}"
        export DG_SM120_MOE_SKIP_SFA_FILL_MAX_M="${DG_SM120_MOE_SKIP_SFA_FILL_MAX_M:-16}"
        export CUTE_DSL_ARCH="${CUTE_DSL_ARCH:-sm_120a}"
        export B12X_CUTE_COMPILE_CACHE_DIR="${B12X_CUTE_COMPILE_CACHE_DIR:-/tmp/b12x_cute_cache}"
        export VLLM_MAX_MODEL_LEN="${VLLM_MAX_MODEL_LEN:-131072}"
        export VLLM_MAX_NUM_BATCHED_TOKENS="${VLLM_MAX_NUM_BATCHED_TOKENS:-4096}"
        export VLLM_MAX_NUM_SEQS="${VLLM_MAX_NUM_SEQS:-4}"
        export VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE="${VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE:-8}"
        export VLLM_PERFORMANCE_MODE="${VLLM_PERFORMANCE_MODE:-balanced}"
        export VLLM_OPTIMIZATION_LEVEL="${VLLM_OPTIMIZATION_LEVEL:-2}"
        export VLLM_GPU_MEMORY_UTILIZATION="${VLLM_GPU_MEMORY_UTILIZATION:-0.980}"
        export VLLM_ENFORCE_EAGER="${VLLM_ENFORCE_EAGER:-0}"
        export VLLM_KV_CACHE_MEMORY_BYTES="${VLLM_KV_CACHE_MEMORY_BYTES:-8589934592}"
        export VLLM_EXTRA_ARGS="${VLLM_EXTRA_ARGS:-}"
        set --
        case "$(printenv VLLM_ENFORCE_EAGER)" in
          1|true|TRUE|yes|YES|on|ON)
            set -- "$@" --enforce-eager
            ;;
        esac
        if [[ -n "$(printenv VLLM_KV_CACHE_MEMORY_BYTES)" ]]; then
          set -- "$@" --kv-cache-memory-bytes "$(printenv VLLM_KV_CACHE_MEMORY_BYTES)"
        fi
        if [[ -n "$(printenv VLLM_PROFILER_CONFIG_FILE)" ]]; then
          set -- "$@" --profiler-config "$(cat "$(printenv VLLM_PROFILER_CONFIG_FILE)")"
        elif [[ -n "$(printenv VLLM_PROFILER_CONFIG_JSON)" ]]; then
          set -- "$@" --profiler-config "$(printenv VLLM_PROFILER_CONFIG_JSON)"
        fi
        if [[ -n "$(printenv VLLM_SPECULATIVE_CONFIG_FILE)" ]]; then
          set -- "$@" --speculative-config "$(cat "$(printenv VLLM_SPECULATIVE_CONFIG_FILE)")"
        elif [[ -n "$(printenv VLLM_SPECULATIVE_CONFIG_JSON)" ]]; then
          set -- "$@" --speculative-config "$(printenv VLLM_SPECULATIVE_CONFIG_JSON)"
        fi
        export DG_SM120_INSTALL_PROFILE_PATCH="${DG_SM120_INSTALL_PROFILE_PATCH:-0}"
        export DG_SM120_INSTALL_MOE_PROFILE_PATCH="${DG_SM120_INSTALL_MOE_PROFILE_PATCH:-0}"
        export DG_SM120_PROFILE_LAYER="${DG_SM120_PROFILE_LAYER:-0}"
        export DG_SM120_PROFILE_EVERY="${DG_SM120_PROFILE_EVERY:-2048}"
        export DG_SM120_KERNEL_PROFILE="${DG_SM120_KERNEL_PROFILE:-0}"
        export DG_SM120_KERNEL_PROFILE_EVERY="${DG_SM120_KERNEL_PROFILE_EVERY:-256}"
        export DG_SM120_KERNEL_PROFILE_PATH="${DG_SM120_KERNEL_PROFILE_PATH:-/tmp/dg_sm120_kernel_profile.tsv}"
        export DG_SM120_PROFILE_MOE_SHAPES="${DG_SM120_PROFILE_MOE_SHAPES:-0}"
        export DG_SM120_PROFILE_MOE_EVERY="${DG_SM120_PROFILE_MOE_EVERY:-1}"
        export DG_SM120_MOE_PROFILE_PATH="${DG_SM120_MOE_PROFILE_PATH:-/tmp/dg_sm120_moe_shapes.jsonl}"
        export VLLM_ALLREDUCE_USE_SYMM_MEM=0
        exec vllm serve "$(printenv MODEL_PATH)" \
          --served-model-name "$(printenv MODEL_NAME)" \
          --trust-remote-code \
          --attention-backend FLASHMLA_SPARSE \
          --moe-backend deep_gemm \
          --kv-cache-dtype fp8_ds_mla \
          --block-size 256 \
          --enable-expert-parallel \
          -tp 4 \
          --tokenizer-mode deepseek_v4 \
          --tool-call-parser deepseek_v4 \
          --enable-auto-tool-choice \
          --reasoning-parser deepseek_v4 \
          --max-model-len "$(printenv VLLM_MAX_MODEL_LEN)" \
          --max-num-batched-tokens "$(printenv VLLM_MAX_NUM_BATCHED_TOKENS)" \
          --max-num-seqs "$(printenv VLLM_MAX_NUM_SEQS)" \
          --max-num-partial-prefills 1 \
          --max-long-partial-prefills 1 \
          --enable-chunked-prefill \
          --optimization-level "$(printenv VLLM_OPTIMIZATION_LEVEL)" \
          --performance-mode "$(printenv VLLM_PERFORMANCE_MODE)" \
          --max-cudagraph-capture-size "$(printenv VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE)" \
          --gpu-memory-utilization "$(printenv VLLM_GPU_MEMORY_UTILIZATION)" \
          --host 0.0.0.0 \
          --port 8000 \
          --disable-uvicorn-access-log \
          $(printenv VLLM_EXTRA_ARGS) \
          "$@"
    ipc: host
    shm_size: 32gb
    init: true
    ports:
      - "8080:8000"
    environment:
      # Where to load the model from (inside the container).
      # Defaults to the bind-mount target below; set MODEL_PATH=deepseek-ai/DeepSeek-V4-Flash
      # on the host (and unset MODEL_LOCAL_DIR) to fall back to HF Hub download.
      MODEL_PATH: "${MODEL_PATH:-/models/deepseek-v4-flash}"
      # Stable name used by clients (curl/bench scripts hit `model: <MODEL_NAME>`).
      MODEL_NAME: "${MODEL_NAME:-deepseek-ai/DeepSeek-V4-Flash}"
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      CUDA_HOME: /usr/local/cuda
      TORCH_CUDA_ARCH_LIST: "12.0"
      TORCH_ALLOW_TF32_CUBLAS_OVERRIDE: "1"
      VLLM_TARGET_DEVICE: cuda
      VLLM_USE_DEEP_GEMM_E8M0: "1"
      VLLM_ALLREDUCE_USE_SYMM_MEM: "0"
      DG_SM120_FULL_CONTEXT_BF16_BMM: "1"
      DG_SM120_INDEXED_BF16_BMM: "1"
      DG_SM120_WORKSPACE_FUSED_ATTENTION: "1"
      DG_SM120_WORKSPACE_SPLIT_ATTENTION: "${DG_SM120_WORKSPACE_SPLIT_ATTENTION:-1}"
      DG_SM120_ENABLE_FP8_M1_KBLOCK: "${DG_SM120_ENABLE_FP8_M1_KBLOCK:-1}"
      DG_SM120_ENABLE_FP8_M1_WARPCOL_HEURISTIC: "${DG_SM120_ENABLE_FP8_M1_WARPCOL_HEURISTIC:-1}"
      DG_SM120_ENABLE_FP8_M1_FUSED: "${DG_SM120_ENABLE_FP8_M1_FUSED:-1}"
      DG_SM120_ENABLE_BHR_M1_MMA: "${DG_SM120_ENABLE_BHR_M1_MMA:-1}"
      DG_SM120_MOE_SKIP_SFA_FILL: "${DG_SM120_MOE_SKIP_SFA_FILL:-1}"
      DG_SM120_MOE_ROW_GROUPED: "${DG_SM120_MOE_ROW_GROUPED:-1}"
      DG_SM120_MOE_ROW_GROUPED_MAX_M: "${DG_SM120_MOE_ROW_GROUPED_MAX_M:-6}"
      DG_SM120_MOE_ROW_GROUPED_SKIP_SFA_FILL: "${DG_SM120_MOE_ROW_GROUPED_SKIP_SFA_FILL:-1}"
      DG_SM120_MOE_DIRECT_GROUPS_WHEN_NO_SHRINK: "${DG_SM120_MOE_DIRECT_GROUPS_WHEN_NO_SHRINK:-1}"
      DG_SM120_CACHE_FP8_SFB: "${DG_SM120_CACHE_FP8_SFB:-1}"
      DG_SM120_CACHE_FP8_SFA_FILL: "${DG_SM120_CACHE_FP8_SFA_FILL:-1}"
      DG_SM120_SPEC_ARGMAX_FASTPATH: "${DG_SM120_SPEC_ARGMAX_FASTPATH:-1}"
      DG_SM120_BHR_D_PER_BLOCK: "${DG_SM120_BHR_D_PER_BLOCK:-1}"
      DG_SM120_BHR_KBLOCK_SCALE: "${DG_SM120_BHR_KBLOCK_SCALE:-1}"
      DG_SM120_ENABLE_BHR_WARPCOL_HEURISTIC: "${DG_SM120_ENABLE_BHR_WARPCOL_HEURISTIC:-1}"
      DG_SM120_BHR_WARPCOL_WARPS: "${DG_SM120_BHR_WARPCOL_WARPS:-4}"
      DG_SM120_BHR_WARPCOL_COLS: "${DG_SM120_BHR_WARPCOL_COLS:-0}"
      DG_SM120_ENABLE_SMALL_M_MMA: "0"
      DG_SM120_MAIN_TOPK_CAP: "${DG_SM120_MAIN_TOPK_CAP:-128}"
      DG_SM120_ACTIVE_HEADS: "32"
      DG_SM120_SEQUENTIAL_COMPRESSOR: "${DG_SM120_SEQUENTIAL_COMPRESSOR:-1}"
      DG_SM120_FLASHMLA_PREFILL_WORKSPACE_FACTOR: "${DG_SM120_FLASHMLA_PREFILL_WORKSPACE_FACTOR:-1}"
      DG_SM120_PREFILL_WORKSPACE_CHUNK: "${DG_SM120_PREFILL_WORKSPACE_CHUNK:-256}"
      DG_SM120_PREFILL_TORCH_BMM: "${DG_SM120_PREFILL_TORCH_BMM:-1}"
      DG_SM120_PREFILL_TORCH_COMPILE: "${DG_SM120_PREFILL_TORCH_COMPILE:-0}"
      DG_SM120_PREFILL_TORCH_COMPILE_MIN_ROWS: "${DG_SM120_PREFILL_TORCH_COMPILE_MIN_ROWS:-64}"
      DG_SM120_PREFILL_CUDNN: "${DG_SM120_PREFILL_CUDNN:-0}"
      DG_SM120_PREFILL_CUDNN_UNMASKED: "${DG_SM120_PREFILL_CUDNN_UNMASKED:-0}"
      DG_SM120_PREFILL_TRUST_INDICES: "${DG_SM120_PREFILL_TRUST_INDICES:-1}"
      DG_SM120_PREFILL_TRIM_TOPK_MIN_WIDTH: "${DG_SM120_PREFILL_TRIM_TOPK_MIN_WIDTH:-2048}"
      DG_SM120_PREFILL_TRIM_TOPK: "${DG_SM120_PREFILL_TRIM_TOPK:-1}"
      DG_SM120_PREFILL_DYNAMIC_COMPRESSED_N: "${DG_SM120_PREFILL_DYNAMIC_COMPRESSED_N:-1}"
      DG_SM120_PREFILL_EMPTY_COMBINED_INDICES: "${DG_SM120_PREFILL_EMPTY_COMBINED_INDICES:-1}"
      DG_SM120_PREFILL_INDEXED_SPLIT: "${DG_SM120_PREFILL_INDEXED_SPLIT:-0}"
      DG_SM120_PREFILL_INDEX_SELECT: "${DG_SM120_PREFILL_INDEX_SELECT:-0}"
      DG_SM120_PREFILL_GATHER_WORKSPACE: "${DG_SM120_PREFILL_GATHER_WORKSPACE:-0}"
      DG_SM120_PREFILL_DIRECT_FP8_MAP: "${DG_SM120_PREFILL_DIRECT_FP8_MAP:-0}"
      DG_SM120_PREFILL_DIRECT_FP8_MAP_STRICT: "${DG_SM120_PREFILL_DIRECT_FP8_MAP_STRICT:-0}"
      DG_SM120_FUSED_DECODE_V2: "${DG_SM120_FUSED_DECODE_V2:-0}"
      DG_SM120_FUSED_DECODE_V2_STRICT: "${DG_SM120_FUSED_DECODE_V2_STRICT:-0}"
      DG_SM120_FUSED_DECODE_V2_NATIVE: "${DG_SM120_FUSED_DECODE_V2_NATIVE:-0}"
      DG_SM120_FUSED_DECODE_V2_FP8MMA: "${DG_SM120_FUSED_DECODE_V2_FP8MMA:-1}"
      DG_SM120_FUSED_DECODE_V2_SPLITK: "${DG_SM120_FUSED_DECODE_V2_SPLITK:-4}"
      DG_SM120_FUSED_PREFILL_V2: "${DG_SM120_FUSED_PREFILL_V2:-0}"
      DG_SM120_FUSED_PREFILL_V2_STRICT: "${DG_SM120_FUSED_PREFILL_V2_STRICT:-0}"
      DG_SM120_HC_PRENORM_V2: "${DG_SM120_HC_PRENORM_V2:-1}"
      DG_SM120_ENABLE_B12X_MOE: "${DG_SM120_ENABLE_B12X_MOE:-0}"
      DG_SM120_B12X_A1_GS: "${DG_SM120_B12X_A1_GS:-1.0}"
      DG_SM120_B12X_A2_GS: "${DG_SM120_B12X_A2_GS:-1.0}"
      DG_SM120_BYPASS_TP_ALLREDUCE: "${DG_SM120_BYPASS_TP_ALLREDUCE:-0}"
      DG_SM120_MOE_SKIP_SFA_FILL_MAX_M: "${DG_SM120_MOE_SKIP_SFA_FILL_MAX_M:-16}"
      CUTE_DSL_ARCH: "${CUTE_DSL_ARCH:-sm_120a}"
      B12X_CUTE_COMPILE_CACHE_DIR: "${B12X_CUTE_COMPILE_CACHE_DIR:-/tmp/b12x_cute_cache}"
      VLLM_MAX_MODEL_LEN: "${VLLM_MAX_MODEL_LEN:-131072}"
      VLLM_MAX_NUM_BATCHED_TOKENS: "${VLLM_MAX_NUM_BATCHED_TOKENS:-4096}"
      VLLM_MAX_NUM_SEQS: "${VLLM_MAX_NUM_SEQS:-4}"
      VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE: "${VLLM_MAX_CUDAGRAPH_CAPTURE_SIZE:-8}"
      VLLM_PERFORMANCE_MODE: "${VLLM_PERFORMANCE_MODE:-balanced}"
      VLLM_OPTIMIZATION_LEVEL: "${VLLM_OPTIMIZATION_LEVEL:-2}"
      VLLM_GPU_MEMORY_UTILIZATION: "${VLLM_GPU_MEMORY_UTILIZATION:-0.980}"
      VLLM_ENFORCE_EAGER: "${VLLM_ENFORCE_EAGER:-0}"
      VLLM_KV_CACHE_MEMORY_BYTES: "${VLLM_KV_CACHE_MEMORY_BYTES:-8589934592}"
      VLLM_PROFILER_CONFIG_JSON: "${VLLM_PROFILER_CONFIG_JSON:-}"
      VLLM_PROFILER_CONFIG_FILE: "${VLLM_PROFILER_CONFIG_FILE:-}"
      VLLM_SPECULATIVE_CONFIG_JSON: "${VLLM_SPECULATIVE_CONFIG_JSON:-}"
      VLLM_SPECULATIVE_CONFIG_FILE: "${VLLM_SPECULATIVE_CONFIG_FILE:-/workspace/DeepGEMM/docker/vllm_speculative_mtp1_local_argmax.json}"
      VLLM_EXTRA_ARGS: "${VLLM_EXTRA_ARGS:-}"
      DG_SM120_INSTALL_PROFILE_PATCH: "${DG_SM120_INSTALL_PROFILE_PATCH:-0}"
      DG_SM120_INSTALL_MOE_PROFILE_PATCH: "${DG_SM120_INSTALL_MOE_PROFILE_PATCH:-0}"
      DG_SM120_PROFILE_LAYER: "${DG_SM120_PROFILE_LAYER:-0}"
      DG_SM120_PROFILE_EVERY: "${DG_SM120_PROFILE_EVERY:-2048}"
      DG_SM120_KERNEL_PROFILE: "${DG_SM120_KERNEL_PROFILE:-0}"
      DG_SM120_KERNEL_PROFILE_EVERY: "${DG_SM120_KERNEL_PROFILE_EVERY:-256}"
      DG_SM120_KERNEL_PROFILE_PATH: "${DG_SM120_KERNEL_PROFILE_PATH:-/tmp/dg_sm120_kernel_profile.tsv}"
      DG_SM120_PROFILE_MOE_SHAPES: "${DG_SM120_PROFILE_MOE_SHAPES:-0}"
      DG_SM120_PROFILE_MOE_EVERY: "${DG_SM120_PROFILE_MOE_EVERY:-1}"
      DG_SM120_MOE_PROFILE_PATH: "${DG_SM120_MOE_PROFILE_PATH:-/tmp/dg_sm120_moe_shapes.jsonl}"
      MAX_JOBS: "${MAX_JOBS:-40}"
    volumes:
      - .:/workspace/DeepGEMM
      - ./vllm_src:/workspace/vllm
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/.cache/pip:/root/.cache/pip
      # Local model snapshot (read-only). Override MODEL_LOCAL_DIR on the host
      # to point at any directory containing config.json + safetensors + the
      # DeepSeek V4 *.py files. The path inside the container is fixed at
      # /models/deepseek-v4-flash and matches the MODEL_PATH default above.
      - ${MODEL_LOCAL_DIR:-/media/fmodels/deepseek-ai/DeepSeek-V4-Flash}:/models/deepseek-v4-flash:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0", "1", "2", "3"]
              capabilities: [gpu]
